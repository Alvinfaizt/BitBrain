<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitBrain - Kuis Tebak-Tebakan IT</title>
    <!-- Menghubungkan ke file CSS Eksternal (Sesuai Ketentuan Teknis) -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Aplikasi -->
    <header>
        <div class="logo">🧠 BitBrain</div>
        <div class="timer-box">Sisa Waktu: <span id="timer">15</span>s</div>
    </header>

    <!-- Kontainer Utama Kuis -->
    <main class="quiz-container">
        
        <!-- BAGIAN 1: Halaman Mulai (Landing) -->
        <section id="start-screen" class="screen">
            <h1>Selamat Datang di BitBrain!</h1>
            <p>Uji kemampuan dan selera humormu lewat kuis tebak-tebakan IT ini.</p>
            <div class="input-group">
                <input type="text" id="username" placeholder="Masukkan nama kamu..." required>
            </div>
            <button id="start-btn" class="btn">Mulai Kuis</button>
        </section>

        <!-- BAGIAN 2: Halaman Pertanyaan (Dinamis diisi lewat JS) -->
        <section id="quiz-screen" class="screen hide">
            <div class="quiz-header">
                <span id="question-number">Soal 1 dari 5</span>
            </div>
            <h2 id="question-text">Di sini tempat teks pertanyaan kuis IT...</h2>
            <div id="answer-options" class="options-grid">
                <!-- Tombol pilihan ganda akan muncul secara dinamis lewat JavaScript -->
            </div>
        </section>

        <!-- BAGIAN 3: Halaman Hasil Akhir -->
        <section id="result-screen" class="screen hide">
            <h2>Kuis Selesai!</h2>
            <p id="player-greeting">Hebat, [Nama Players]!</p>
            <div class="score-box">
                <p>Skor Kamu:</p>
                <span id="final-score">0</span>
            </div>
            <button id="restart-btn" class="btn">Main Lagi</button>
        </section>

    </main>

    <!-- Footer / Hak Cipta Kelompok -->
    <footer>
        <p>&copy; 2026 BitBrain Team. All Rights Reserved.</p>
    </footer>

    <!-- Menghubungkan ke file JavaScript (Sesuai Ketentuan Teknis) -->
    <script src="js/script.js"></script>
</body>
</html>
